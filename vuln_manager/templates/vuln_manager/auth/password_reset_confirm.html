<!DOCTYPE html>
<html class="dark" lang="en">
   <head>
      <meta charset="utf-8"/>
      <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
      <title>CVE3PO - Set New Password</title>
      <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
      <style>
         .bg-mesh {
         background-color: #060e20;
         background-image:
         radial-gradient(at 0% 0%, hsla(200, 96%, 61%, 0.1) 0px, transparent 50%),
         radial-gradient(at 100% 0%, hsla(354, 100%, 72%, 0.05) 0px, transparent 50%);
         }
      </style>
   </head>
   <body class="bg-mesh min-h-screen flex items-center justify-center p-6 text-slate-100 font-[Inter]">
      <main class="w-full max-w-[440px] rounded-xl p-10 bg-slate-900/80 border border-slate-700/60 shadow-2xl">
         <h1 class="font-[Manrope] text-3xl font-extrabold tracking-tight text-cyan-300 mb-3">Set new password</h1>
         {% if validlink %}
         {% if form.errors %}
         <div class="mb-4 rounded-lg border border-rose-500/40 bg-rose-900/30 px-4 py-3 text-xs text-rose-200">
            {{ form.errors }}
         </div>
         {% endif %}
         <form method="post" class="space-y-4">
            {% csrf_token %}
            <input class="block w-full rounded-lg bg-slate-950/80 border-0 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-cyan-500/40" id="id_new_password1" name="new_password1" placeholder="New password" required type="password"/>
            <input class="block w-full rounded-lg bg-slate-950/80 border-0 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:ring-2 focus:ring-cyan-500/40" id="id_new_password2" name="new_password2" placeholder="Repeat new password" required type="password"/>
            <button type="submit" class="w-full rounded-lg bg-gradient-to-br from-cyan-400 to-cyan-500 text-slate-950 py-3 font-semibold uppercase tracking-wider text-xs">Update password</button>
         </form>
         {% else %}
         <p class="text-sm text-rose-300">This reset link is invalid or expired.</p>
         {% endif %}
      </main>
   </body>
</html>

<!DOCTYPE html>
<html class="dark" lang="en">
   <head>
      <meta charset="utf-8"/>
      <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
      <title>CVE3PO - Reset Password</title>
      <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
      <script id="tailwind-config">
         tailwind.config = {
           darkMode: "class",
           theme: {
             extend: {
               colors: {
                 "primary": "#3bbffa",
                 "primary-container": "#22b1ec",
                 "background": "#060e20",
                 "surface-container-lowest": "#000000",
                 "surface-container-low": "#091328",
                 "surface-container-high": "#141f38",
                 "surface-container": "#0f1930",
                 "on-primary": "#00374d",
                 "on-surface": "#dee5ff",
                 "on-surface-variant": "#a3aac4",
                 "outline": "#6d758c",
                 "outline-variant": "#40485d",
                 "error-container": "#9f0519",
                 "on-error-container": "#ffa8a3"
               },
               fontFamily: {
                 "headline": ["Manrope"],
                 "body": ["Inter"],
                 "label": ["Inter"]
               }
             }
           }
         }
      </script>
      <style>
         .material-symbols-outlined {
         font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
         }
         .bg-mesh {
         background-color: #060e20;
         background-image:
         radial-gradient(at 0% 0%, hsla(200, 96%, 61%, 0.1) 0px, transparent 50%),
         radial-gradient(at 100% 0%, hsla(354, 100%, 72%, 0.05) 0px, transparent 50%),
         radial-gradient(at 100% 100%, hsla(200, 96%, 61%, 0.1) 0px, transparent 50%),
         radial-gradient(at 0% 100%, hsla(354, 100%, 72%, 0.05) 0px, transparent 50%);
         }
         .glass-card {
         background: rgba(15, 25, 48, 0.7);
         backdrop-filter: blur(20px);
         -webkit-backdrop-filter: blur(20px);
         }
      </style>
   </head>
   <body class="bg-mesh font-body text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary/30 selection:text-primary">
      <main class="w-full max-w-[440px] relative z-10">
         <div class="mb-12 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high mb-6 shadow-2xl">
               <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
            </div>
            <h1 class="font-headline text-4xl font-extrabold tracking-tight text-primary mb-2">CVE3PO</h1>
            <p class="text-on-surface-variant text-sm font-medium tracking-wide uppercase">Password Recovery</p>
         </div>
         <div class="glass-card rounded-xl p-10 shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative">
            <div class="absolute inset-0 rounded-xl outline outline-1 outline-outline-variant/15 pointer-events-none"></div>
            <header class="mb-8">
               <h2 class="font-headline text-2xl font-bold text-on-surface leading-tight">Forgot Access?</h2>
               <p class="mt-2 text-xs text-on-surface-variant">Enter your email and we'll send you a reset link.</p>
            </header>
            {% if form.errors %}
            <div class="mb-6 rounded-lg border border-error-container/40 bg-error-container/30 px-4 py-3 text-xs text-on-error-container">
               {{ form.errors }}
            </div>
            {% endif %}
            <form method="post" class="space-y-6">
               {% csrf_token %}
               <div class="space-y-2">
                  <label class="font-label text-[0.6875rem] uppercase tracking-wider text-on-surface-variant font-semibold" for="id_email">Email</label>
                  <div class="relative group">
                     <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors">alternate_email</span>
                     </div>
                     <input class="block w-full bg-surface-container-lowest border-0 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/30 transition-all font-body text-sm" id="id_email" name="email" placeholder="you@company.com" required type="email" value="{{ form.email.value|default:'' }}"/>
                  </div>
               </div>
               <button class="w-full flex justify-center items-center gap-2 py-4 px-6 rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-label text-sm font-bold uppercase tracking-[0.05em] shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
               <span>Send Reset Link</span>
               <span class="material-symbols-outlined text-lg">arrow_forward</span>
               </button>
            </form>
            <div class="mt-6 text-center">
               <a class="font-label text-[0.6875rem] uppercase tracking-wider text-primary hover:text-primary-container transition-colors font-bold" href="{% url 'login' %}">Back to Login</a>
            </div>
         </div>
      </main>
   </body>
</html>

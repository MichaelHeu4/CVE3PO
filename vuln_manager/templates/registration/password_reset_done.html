<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CVE3PO - Reset Email Sent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
    <main class="w-full max-w-md rounded-2xl bg-slate-900 border border-slate-700 p-8">
        <h1 class="text-2xl font-bold mb-2">Check your inbox</h1>
        <p class="text-sm text-slate-300">If your account exists, a password reset email has been sent.</p>
        <a href="{% url 'login' %}" class="mt-6 inline-block text-sm text-cyan-400 hover:text-cyan-300">Back to login</a>
    </main>
</body>
</html>

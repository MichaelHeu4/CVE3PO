<!DOCTYPE html>
<html class="dark" lang="en">
   <head>
      <meta charset="utf-8"/>
      <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
      <title>CVE3PO - Reset Email Sent</title>
      <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
      <style>
         .bg-mesh {
         background-color: #060e20;
         background-image:
         radial-gradient(at 0% 0%, hsla(200, 96%, 61%, 0.1) 0px, transparent 50%),
         radial-gradient(at 100% 0%, hsla(354, 100%, 72%, 0.05) 0px, transparent 50%);
         }
      </style>
   </head>
   <body class="bg-mesh min-h-screen flex items-center justify-center p-6 text-slate-100 font-[Inter]">
      <main class="w-full max-w-[440px] rounded-xl p-10 bg-slate-900/80 border border-slate-700/60 shadow-2xl">
         <h1 class="font-[Manrope] text-3xl font-extrabold tracking-tight text-cyan-300 mb-3">Check your inbox</h1>
         <p class="text-sm text-slate-300">If your account exists, a password reset email has been sent.</p>
         <a href="{% url 'login' %}" class="mt-8 inline-block text-xs uppercase tracking-wider font-semibold text-cyan-300 hover:text-cyan-200">Back to login</a>
      </main>
   </body>
</html>

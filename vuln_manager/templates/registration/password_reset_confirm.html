<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CVE3PO - Set New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
    <main class="w-full max-w-md rounded-2xl bg-slate-900 border border-slate-700 p-8">
        <h1 class="text-2xl font-bold mb-2">Set a new password</h1>
        {% if validlink %}
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="w-full rounded-lg bg-cyan-500 text-slate-950 py-2 font-semibold">Update password</button>
            </form>
        {% else %}
            <p class="text-sm text-rose-300">This reset link is invalid or expired.</p>
        {% endif %}
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CVE3PO - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
    <main class="w-full max-w-md rounded-2xl bg-slate-900 border border-slate-700 p-8">
        <h1 class="text-2xl font-bold mb-2">Reset password</h1>
        <p class="text-sm text-slate-300 mb-6">Enter your account email and we will send you a reset link.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.email }}
            <button type="submit" class="w-full rounded-lg bg-cyan-500 text-slate-950 py-2 font-semibold">Send reset link</button>
        </form>
        <a href="{% url 'login' %}" class="mt-4 inline-block text-sm text-cyan-400 hover:text-cyan-300">Back to login</a>
    </main>
</body>
</html>
